# Answer-only agent for gateway_thread mode.
# Gateway posts the Slack thread — this agent must NOT say "done"
# and must NOT call Slack post tools.
spec_version: v1
kind: native
style: default
name: slack_gateway_answer_agent
llm: groq/openai/gpt-oss-120b
title: Slack Gateway Answer Agent
description: >
  Plain answer agent for the Slack MCP gateway (gateway_thread mode).
  Does not post to Slack; the gateway posts the reply in-thread.
instructions: |
  You are a helpful Slack support assistant.

  Answer the user's question clearly and concisely (1–4 short sentences).
  Do not mention tools, channels, or timestamps.
  Do not say the word "done".
  Do not say "skip" unless the user message is empty noise.
  If the user continues a conversation (follow-up in a thread), answer that follow-up directly.
