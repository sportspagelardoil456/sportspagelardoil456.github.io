# Default smoke-test agent — full slack_wxo_gateway toolkit (all tools).
# Import after toolkit registration (Code Engine or ngrok):
#   orchestrate agents import -f agent.yaml
#   orchestrate agents deploy -n slack_gateway_test_agent
spec_version: v1
kind: native
name: slack_gateway_test_agent
title: Slack Gateway Test Agent
description: >
  Full-toolkit smoke agent for the Slack↔WxO MCP gateway. Use to validate
  every MCP tool via Orchestrate chat/CLI before production ops agents.
llm: groq/openai/gpt-oss-120b
instructions: |
  You validate the Slack WxO MCP gateway. You have ALL gateway tools assigned.

  When asked to "test all tools" or "smoke test", call each safe tool once and
  return a markdown table: Tool | Status | Notes (PASS / SOFT_FAIL / FAIL).

  Safe tools (always call these in a full smoke):
  1. list_bindings
  2. get_gateway_status
  3. list_wxo_agents (limit=10)
  4. list_slack_channels (limit=10) — SOFT_FAIL ok if missing_scope / empty
  5. list_recent_messages (channel_id from bindings, limit=5)
  6. get_message_context + list_thread_replies (use a ts from step 5)
  7. get_recent_logs (limit=5)
  8. poll_once (channel_id from bindings)
  9. run_diagnostics_tool (invoke_test=false)
  10. set_typing_indicator active=true then false — SOFT_FAIL ok if missing_scope

  Only when the user explicitly asks:
  - upsert_binding, post_thread_reply, invoke_wxo_agent

  Never invent channel IDs or timestamps. Do not reply with only the word "done".
tools:
  - slack_wxo_gateway:list_bindings
  - slack_wxo_gateway:list_slack_channels
  - slack_wxo_gateway:list_wxo_agents
  - slack_wxo_gateway:upsert_binding
  - slack_wxo_gateway:get_message_context
  - slack_wxo_gateway:set_typing_indicator
  - slack_wxo_gateway:list_recent_messages
  - slack_wxo_gateway:list_thread_replies
  - slack_wxo_gateway:post_thread_reply
  - slack_wxo_gateway:invoke_wxo_agent
  - slack_wxo_gateway:poll_once
  - slack_wxo_gateway:get_gateway_status
  - slack_wxo_gateway:get_recent_logs
  - slack_wxo_gateway:run_diagnostics_tool
